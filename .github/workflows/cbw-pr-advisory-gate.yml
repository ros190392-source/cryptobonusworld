name: CBW PR Advisory Gate

# Advisory-only gate for pull requests targeting master. Read-only permissions;
# never deploys, never writes repository contents, and runs only on the safe
# pull_request event (never the privileged target variant).
# Changed-file discovery is fail-closed: a discovery error can never become an
# empty-list "PASS" for branch-authority or scope. Context values are passed
# through step-level env, never interpolated directly into shell command text.

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: cbw-pr-advisory-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  advisory:
    name: Advisory validation (non-blocking)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head with full history
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      # --- Fail-closed changed-file discovery (no silent error suppression; verified merge base) ---
      - name: Determine changed files (fail-closed)
        id: changed
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail
          git cat-file -e "${HEAD_SHA}^{commit}"
          git fetch --no-tags origin "+refs/heads/${BASE_REF}:refs/remotes/origin/${BASE_REF}"
          MB="$(git merge-base "refs/remotes/origin/${BASE_REF}" "${HEAD_SHA}")"
          if [ -z "${MB}" ]; then
            echo "::error::no merge base between ${BASE_REF} and PR head"
            exit 1
          fi
          git diff --name-only "${MB}" "${HEAD_SHA}" > changed-files.txt
          echo "count=$(wc -l < changed-files.txt | tr -d ' ')" >> "$GITHUB_OUTPUT"
          echo "mergeBase=${MB}" >> "$GITHUB_OUTPUT"

      # --- Extract a per-PR task-contract declaration from the PR body (Node reads the event) ---
      - name: Extract task-contract declaration
        id: contract
        if: always()
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const ev = JSON.parse(fs.readFileSync(process.env.GITHUB_EVENT_PATH, 'utf8'));
          const body = (ev.pull_request && ev.pull_request.body) || '';
          const m = body.match(/Task contract path:\s*`([^`\r\n]+)`/);
          let status = 'none', out = '';
          if (m) {
            const p = m[1].trim();
            const hasControl = [...p].some((ch) => { const c = ch.charCodeAt(0); return c < 0x20 || c === 0x7f; });
            const unsafe =
              p === '' ||
              /\s/.test(p) ||
              hasControl ||
              p.startsWith('/') || /^[A-Za-z]:/.test(p) || p.startsWith('~') ||
              p.split('/').includes('..') ||
              !/\.json$/.test(p);
            status = unsafe ? 'invalid' : 'valid';
            if (!unsafe) out = p;
          }
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `status=${status}\npath=${out}\n`);
          NODE

      - name: AI Ops foundation validation
        id: aiops
        if: always()
        continue-on-error: true
        run: npm run ai-ops:validate

      - name: Production build
        id: build
        if: always()
        continue-on-error: true
        run: npm run build

      - name: Affiliate integrity (safe)
        id: affiliate
        if: always()
        continue-on-error: true
        run: npm run validate:affiliate

      - name: SEO check (safe)
        id: seo
        if: always()
        continue-on-error: true
        run: npm run seo:check

      # Branch authority runs ONLY when discovery succeeded (never on an empty list).
      - name: Branch authority validation
        id: branch
        if: steps.changed.outcome == 'success'
        continue-on-error: true
        run: node scripts/ai-ops/validate-branch-authority.mjs owner-ops/ai-ops/CBW_BRANCH_AUTHORITY_MAP_v1.json master changed-files.txt

      # Scope runs ONLY when discovery succeeded AND a valid contract was declared.
      - name: Scope validation
        id: scope
        if: steps.changed.outcome == 'success'
        continue-on-error: true
        env:
          CONTRACT_STATUS: ${{ steps.contract.outputs.status }}
          CONTRACT_PATH: ${{ steps.contract.outputs.path }}
        run: |
          set -euo pipefail
          case "${CONTRACT_STATUS}" in
            valid)
              if [ -f "${CONTRACT_PATH}" ]; then
                node scripts/ai-ops/validate-scope.mjs "${CONTRACT_PATH}" changed-files.txt
              else
                echo "::error::declared task contract not found in PR contents: ${CONTRACT_PATH}"
                exit 1
              fi
              ;;
            invalid)
              echo "::error::invalid task-contract declaration in PR body"
              exit 1
              ;;
            *)
              echo "No task-contract declaration - advisory scope skip (legacy PR)."
              ;;
          esac

      - name: Step summary
        if: always()
        env:
          O_DISCOVERY: ${{ steps.changed.outcome }}
          O_CONTRACT: ${{ steps.contract.outputs.status }}
          O_AIOPS: ${{ steps.aiops.outcome }}
          O_BUILD: ${{ steps.build.outcome }}
          O_AFFILIATE: ${{ steps.affiliate.outcome }}
          O_SEO: ${{ steps.seo.outcome }}
          O_BRANCH: ${{ steps.branch.outcome }}
          O_SCOPE: ${{ steps.scope.outcome }}
          CHANGED_COUNT: ${{ steps.changed.outputs.count }}
        run: |
          {
            echo "## CBW PR Advisory Gate (advisory / non-blocking)"
            echo ""
            echo "| Check | Result |"
            echo "|---|---|"
            echo "| changed-file discovery | ${O_DISCOVERY} |"
            echo "| task-contract declaration | ${O_CONTRACT} |"
            echo "| ai-ops:validate | ${O_AIOPS} |"
            echo "| build | ${O_BUILD} |"
            echo "| validate:affiliate | ${O_AFFILIATE} |"
            echo "| seo:check | ${O_SEO} |"
            echo "| branch-authority | ${O_BRANCH:-skipped} |"
            echo "| scope | ${O_SCOPE:-skipped} |"
            echo ""
            if [ "${O_DISCOVERY}" != "success" ]; then
              echo "> **Changed-file discovery FAILED - branch-authority and scope were NOT evaluated and are NOT considered passing.**"
            else
              echo "Changed files: ${CHANGED_COUNT}"
            fi
            echo ""
            echo "> V1 enforcement is ADVISORY. This workflow does not merge, deploy, or write repository contents. Legacy PRs without a task-contract declaration are allowed with an advisory scope-skip."
          } >> "$GITHUB_STEP_SUMMARY"
