# CryptoBonusWorld — legacy 301 redirects
# Source of truth for the nginx snippet deployed on production (23.88.106.140).
#
# Covers URLs retired in commit d061c12 (Homepage/Redesign Alignment v1):
#   - portal-era /exchanges/{slug}/ review pages (7 slugs)  → /exchanges/
#   - portal-era /guides/ section (index + 22 articles)     → /
# The retired routes also keep noindex meta-refresh stubs in the static build
# as a fallback; these 301s take precedence when the snippet is installed.
#
# APPLY (manual, root@23.88.106.140):
#   1. scp this file to /etc/nginx/snippets/cbw-legacy-redirects.conf
#   2. In /etc/nginx/sites-enabled/cryptobonusworld, inside the 443 server
#      block, add ABOVE the first location block:
#          include snippets/cbw-legacy-redirects.conf;
#      (placement above the static-assets regex location matters: nginx picks
#      the first matching regex in order of appearance)
#   3. nginx -t && systemctl reload nginx
#
# Scope guard: MUST NOT touch /exchanges/ (hub), the six live review pages
# (/bybit/ /mexc/ /okx/ /bitget/ /kucoin/ /bingx/), their /exchanges/{slug}/
# alias stubs, or anything under /go/.

# Retired portal-era exchange reviews → exchanges hub
# (matches with and without trailing slash, and any deeper legacy path)
location ~ ^/exchanges/(binance|coinbase|gate-io|htx|coinex|phemex|bitunix)(/.*)?$ {
    return 301 /exchanges/;
}

# Retired guides section → homepage
location = /guides {
    return 301 /;
}
location ^~ /guides/ {
    return 301 /;
}
