name: Critical Alerts

on:
  workflow_dispatch:
  # Uncomment to enable scheduled critical-only alerting:
  # schedule:
  #   - cron: '0 8 * * *'   # Daily at 08:00 UTC

jobs:
  critical-alert:
    name: Send Critical Alerts
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Generate bonus verification report
        run: npm run bonus:verify:all

      - name: Generate affiliate report
        run: npm run affiliate:report || npm run affiliate:audit:strict

      - name: Send critical alerts
        run: npm run monitor:telegram:critical -- --send