<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Globe: deep blue, bright highlight top-left -->
    <radialGradient id="g-globe" cx="40%" cy="34%" r="65%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#5592CE"/>
      <stop offset="32%"  stop-color="#1A4A8A"/>
      <stop offset="78%"  stop-color="#0A1E4C"/>
      <stop offset="100%" stop-color="#040D24"/>
    </radialGradient>

    <!-- Bitcoin coin: warm orange-gold -->
    <radialGradient id="g-coin" cx="30%" cy="26%" r="72%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#FFD44A"/>
      <stop offset="28%"  stop-color="#F79220"/>
      <stop offset="64%"  stop-color="#CC6600"/>
      <stop offset="100%" stop-color="#8A3E00"/>
    </radialGradient>

    <!-- Coin specular shine -->
    <radialGradient id="g-coinshine" cx="28%" cy="22%" r="52%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="white" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <!-- Orbit ring: gold, fades at ends -->
    <linearGradient id="g-orbit" x1="0%" y1="80%" x2="100%" y2="20%">
      <stop offset="0%"   stop-color="#8A6012" stop-opacity="0.10"/>
      <stop offset="20%"  stop-color="#D4A420" stop-opacity="0.60"/>
      <stop offset="44%"  stop-color="#F6CC40" stop-opacity="1"/>
      <stop offset="56%"  stop-color="#F6CC40" stop-opacity="1"/>
      <stop offset="80%"  stop-color="#D4A420" stop-opacity="0.60"/>
      <stop offset="100%" stop-color="#8A6012" stop-opacity="0.10"/>
    </linearGradient>
  </defs>

  <!-- Stars — subtle depth -->
  <circle cx="11"  cy="16"  r="0.75" fill="white" opacity="0.48"/>
  <circle cx="88"  cy="13"  r="0.60" fill="white" opacity="0.40"/>
  <circle cx="7"   cy="75"  r="0.85" fill="white" opacity="0.36"/>
  <circle cx="93"  cy="82"  r="0.65" fill="white" opacity="0.28"/>
  <circle cx="20"  cy="91"  r="0.50" fill="white" opacity="0.22"/>

  <!-- Planet / Globe -->
  <circle cx="36" cy="52" r="28" fill="url(#g-globe)"/>

  <!-- Latitude lines — very subtle globe detail -->
  <ellipse cx="36" cy="52" rx="28" ry="7.5"
           fill="none" stroke="white" stroke-width="0.55" opacity="0.08"
           transform="rotate(-5 36 52)"/>
  <ellipse cx="36" cy="47" rx="20" ry="5"
           fill="none" stroke="white" stroke-width="0.45" opacity="0.05"/>

  <!-- Orbit Ring — tilted, wraps around both elements -->
  <g transform="rotate(-11 50 50)">
    <ellipse cx="50" cy="50" rx="47.5" ry="11.5"
             stroke="url(#g-orbit)" stroke-width="3.8" fill="none"/>
  </g>

  <!-- Bitcoin Coin — large, in foreground -->
  <circle cx="64" cy="50" r="27" fill="url(#g-coin)"/>
  <!-- Specular highlight on coin -->
  <circle cx="64" cy="50" r="27" fill="url(#g-coinshine)"/>
  <!-- Inner rim — gives coin depth -->
  <circle cx="64" cy="50" r="22.5"
          fill="none" stroke="white" stroke-width="1.2" opacity="0.18"/>

  <!-- ₿ symbol -->
  <text x="64" y="61"
        text-anchor="middle"
        fill="white" opacity="0.97"
        font-size="28" font-weight="900"
        font-family="'Arial Black','Arial Bold',Arial,'Helvetica Neue',sans-serif">&#8383;</text>
</svg>
