name: Production Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'
  push:
    branches:
      - master

concurrency:
  group: production-monitor
  cancel-in-progress: false

jobs:
  monitor:
    name: Build & Health Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── Setup ──────────────────────────────────────────────────────────────

      - name: Checkout
        id: checkout
        uses: actions/checkout@v4

      - name: Setup Node
        id: node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        id: install
        run: npm ci

      - name: Build
        id: build
        run: npm run build

      # ── Affiliate Link Audit ────────────────────────────────────────────────

      - name: Affiliate link audit
        id: affiliate_audit
        run: npm run affiliate:audit:strict
        continue-on-error: false

      # ── Screenshot Audit ───────────────────────────────────────────────────

      - name: Screenshot audit
        id: screenshot_audit
        # Fail only on broken available screenshots (file on disk missing / bad path).
        # Missing screenshots (not yet captured) are warnings — they do NOT fail CI.
        run: npm run screenshots:check
        continue-on-error: false

      # ── SEO Title Audit ────────────────────────────────────────────────────

      - name: SEO title audit
        id: seo_titles
        # Warning mode: fail only if any title exceeds 80 chars or /cdn-cgi/ leaks found.
        # Titles 61-80 chars produce console output but do NOT fail CI.
        run: npm run seo:check
        continue-on-error: false

      # ── Schema Audit ───────────────────────────────────────────────────────

      - name: Schema audit
        id: schema_audit
        # Broken JSON-LD / missing required fields = CI fail.
        # Warnings (duplicate types, missing breadcrumbs) do NOT fail CI.
        run: npm run schema:check
        continue-on-error: false

      # ── Freshness Audit ────────────────────────────────────────────────────

      - name: Freshness audit
        id: freshness_audit
        # Warnings only — stale content does not block deployment.
        run: npm run freshness:audit
        continue-on-error: true

      # ── Internal Links Audit ───────────────────────────────────────────────

      - name: Internal links audit
        id: links_audit
        # Warnings only — orphans / deep pages do not block deployment.
        run: npm run links:audit
        continue-on-error: true

      # ── HTTP Health Checks ──────────────────────────────────────────────────

      - name: Check HEALTHCHECK_URL
        id: healthcheck
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" --max-time 15 "$HEALTHCHECK_URL")
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          if [ "$STATUS" != "200" ]; then
            echo "::error::HEALTHCHECK_URL returned HTTP $STATUS (expected 200)"
            exit 1
          fi
          echo "HEALTHCHECK_URL -> HTTP $STATUS OK"
        env:
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}

      - name: Check sitemap.xml
        id: sitemap
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" --max-time 15 "https://cryptobonusworld.com/sitemap.xml")
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          if [ "$STATUS" != "200" ]; then
            echo "::error::sitemap.xml returned HTTP $STATUS (expected 200)"
            exit 1
          fi
          echo "sitemap.xml -> HTTP $STATUS OK"

      - name: Check robots.txt
        id: robots
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" --max-time 15 "https://cryptobonusworld.com/robots.txt")
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          if [ "$STATUS" != "200" ]; then
            echo "::error::robots.txt returned HTTP $STATUS (expected 200)"
            exit 1
          fi
          echo "robots.txt -> HTTP $STATUS OK"

      # ── Success alert (manual runs only) ───────────────────────────────────

      - name: Telegram - all checks passed (manual run)
        if: success() && github.event_name == 'workflow_dispatch'
        run: |
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MESSAGE=$(printf 'OK *CryptoBonusWorld - All checks passed*\n\nRepo: %s\nBranch: %s\nTime: %s\nRun: %s\n\nBuild OK | Affiliate audit OK | Screenshots OK | SEO titles OK | Schema audit OK | Healthcheck OK | sitemap.xml OK | robots.txt OK' \
            '${{ github.repository }}' \
            '${{ github.ref_name }}' \
            "${TIMESTAMP}" \
            "${RUN_URL}")
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}" \
            --data-urlencode "disable_web_page_preview=true" \
            -o /dev/null -w "Telegram response: %{http_code}\n"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      # ── Failure alert (all triggers) ───────────────────────────────────────

      - name: Telegram - failure alert
        if: failure()
        run: |
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if   [ "${{ steps.checkout.outcome }}" = "failure" ];   then FAILED_STEP="Checkout"
          elif [ "${{ steps.node.outcome }}" = "failure" ];        then FAILED_STEP="Setup Node"
          elif [ "${{ steps.install.outcome }}" = "failure" ];     then FAILED_STEP="npm ci"
          elif [ "${{ steps.build.outcome }}" = "failure" ];          then FAILED_STEP="npm run build"
          elif [ "${{ steps.affiliate_audit.outcome }}" = "failure" ]; then FAILED_STEP="Affiliate link audit (npm run affiliate:audit:strict)"
          elif [ "${{ steps.screenshot_audit.outcome }}" = "failure" ];  then FAILED_STEP="Screenshot audit — broken available screenshot(s)"
          elif [ "${{ steps.seo_titles.outcome }}" = "failure" ];      then FAILED_STEP="SEO title audit — title >80 chars or /cdn-cgi/ leak"
          elif [ "${{ steps.schema_audit.outcome }}" = "failure" ];   then FAILED_STEP="Schema audit — broken JSON-LD or missing required fields"
          elif [ "${{ steps.healthcheck.outcome }}" = "failure" ];     then FAILED_STEP="HEALTHCHECK_URL (HTTP ${{ steps.healthcheck.outputs.status }})"
          elif [ "${{ steps.sitemap.outcome }}" = "failure" ];     then FAILED_STEP="sitemap.xml (HTTP ${{ steps.sitemap.outputs.status }})"
          elif [ "${{ steps.robots.outcome }}" = "failure" ];      then FAILED_STEP="robots.txt (HTTP ${{ steps.robots.outputs.status }})"
          else FAILED_STEP="Unknown step"
          fi

          MESSAGE=$(printf 'FAILED *CryptoBonusWorld - Production check FAILED*\n\nRepo: %s\nBranch: %s\nFailed step: %s\nTime: %s\nRun: %s' \
            '${{ github.repository }}' \
            '${{ github.ref_name }}' \
            "${FAILED_STEP}" \
            "${TIMESTAMP}" \
            "${RUN_URL}")
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}" \
            --data-urlencode "disable_web_page_preview=true" \
            -o /dev/null -w "Telegram response: %{http_code}\n"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
