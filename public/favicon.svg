<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="55%" stop-color="#f5c542"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="inner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#141408"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="letter" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f5c542"/>
    </linearGradient>
  </defs>
  <!-- Gold coin ring -->
  <circle cx="16" cy="16" r="15.5" fill="url(#ring)"/>
  <!-- Dark inner circle -->
  <circle cx="16" cy="16" r="11.5" fill="url(#inner)"/>
  <!-- Stylized "B" for Bonus — geometric letterform -->
  <!-- Vertical stem -->
  <rect x="10" y="7.5" width="2.5" height="17" rx="1.25" fill="url(#letter)"/>
  <!-- Top bowl -->
  <path d="M12.5 7.5 h3.5 a4 4 0 0 1 0 8 h-3.5 z" fill="url(#letter)"/>
  <!-- Bottom bowl -->
  <path d="M12.5 15.5 h4 a4.5 4.5 0 0 1 0 9 h-4 z" fill="url(#letter)"/>
</svg>
