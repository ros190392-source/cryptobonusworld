<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="c-gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <circle cx="16" cy="16" r="16" fill="#0a0c14"/>

  <!--
    Bold geometric C mark.
    Arc: r=10.75, stroke-width=4.5
    Circumference ≈ 67.54
    260° fill (48.78) + 100° gap (18.76) = full circle
    rotate(50°) centers the 100° gap at 3-o'clock → C opens right
  -->
  <circle
    cx="16" cy="16" r="10.75"
    fill="none"
    stroke="url(#c-gold)"
    stroke-width="4.5"
    stroke-linecap="butt"
    stroke-dasharray="48.78 18.76"
    transform="rotate(50 16 16)"
  />
</svg>
