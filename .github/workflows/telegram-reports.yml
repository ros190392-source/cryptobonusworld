name: Telegram Reportson:  workflow_dispatch:jobs:  send-reports:    name: Send Telegram Reports    runs-on: ubuntu-latest    timeout-minutes: 10    steps:      - name: Checkout        uses: actions/checkout@v4      - name: Setup Node        uses: actions/setup-node@v4        with:          node-version: '20'          cache: 'npm'      - name: Install dependencies        run: npm ci      - name: Send bonus verification report        run: npm run bonus:telegram-report -- --send        env:          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}      - name: Send affiliate link report        run: npm run affiliate:telegram-report -- --send        env:          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}      - name: Send screenshots report        run: npm run screenshots:telegram-report -- --send        env:          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}