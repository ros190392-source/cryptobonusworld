<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" role="img" aria-label="CryptoBonusWorld">
  <defs>
    <linearGradient id="sq-gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- iOS-style rounded rect background -->
  <rect width="180" height="180" rx="40" fill="#0a0c14"/>

  <!--
    C mark centred at (90, 90)
    r=60.5, stroke-width=25.3 → same ratio as favicon
    Circumference ≈ 380.2  |  fill=274.9  |  gap=105.3
    rotate(50°)
  -->
  <circle
    cx="90" cy="90" r="60.5"
    fill="none"
    stroke="url(#sq-gold)"
    stroke-width="25.3"
    stroke-linecap="butt"
    stroke-dasharray="274.9 105.3"
    transform="rotate(50 90 90)"
  />
</svg>
