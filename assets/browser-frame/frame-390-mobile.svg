<svg xmlns="http://www.w3.org/2000/svg" width="390" height="48" viewBox="0 0 390 48">

  <!-- Status bar background -->
  <rect width="390" height="44" fill="#000000"/>

  <!-- Time -->
  <text x="30" y="30"
    font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="15" font-weight="600" letter-spacing="-0.3"
    fill="#FFFFFF">12:00</text>

  <!-- Dynamic Island pill -->
  <rect x="155" y="6" width="80" height="28" rx="14" fill="#000000"/>

  <!-- Signal bars (4-bar full) -->
  <rect x="310" y="27" width="3.5" height="7"  rx="1" fill="white"/>
  <rect x="316" y="23" width="3.5" height="11" rx="1" fill="white"/>
  <rect x="322" y="19" width="3.5" height="15" rx="1" fill="white"/>
  <rect x="328" y="15" width="3.5" height="19" rx="1" fill="white"/>

  <!-- WiFi symbol -->
  <path d="M 342 28 Q 348 21, 356 28" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <path d="M 338 24 Q 348 14, 360 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <circle cx="349" cy="31" r="2.5" fill="white"/>

  <!-- Battery -->
  <rect x="367" y="18" width="18" height="10" rx="2.5"
    fill="none" stroke="white" stroke-width="1.5" stroke-opacity="0.9"/>
  <!-- Battery terminal nub -->
  <rect x="385" y="21.5" width="2.5" height="5" rx="1" fill="white" fill-opacity="0.5"/>
  <!-- Battery fill ~80% -->
  <rect x="369" y="20" width="12" height="6" rx="1.5" fill="white"/>

  <!-- Separator line -->
  <line x1="0" y1="44" x2="390" y2="44" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Home indicator region -->
  <rect y="44" width="390" height="4" fill="#000000"/>

</svg>
