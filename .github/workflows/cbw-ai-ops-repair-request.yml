name: CBW AI Ops Repair Request

# Manual repair-CONTRACT preparation only. NOT an autonomous AI worker. Every
# workflow_dispatch input is passed through env and validated in Node from
# process.env (no input is ever interpolated into a shell script). target_branch
# is validated with git itself (git check-ref-format --branch) via spawnSync with
# no shell. Makes no code changes, calls no AI provider, pushes no commit, merges
# nothing, deploys nothing.

on:
  workflow_dispatch:
    inputs:
      task_id:
        description: Task ID (e.g. CBW-...-001)
        required: true
      failed_run_url:
        description: GitHub Actions run URL for ros190392-source/cryptobonusworld
        required: true
      failure_category:
        description: Failure category (allowed deterministic categories only)
        required: true
        type: choice
        options:
          - formatting
          - lint
          - deterministic-type-error
          - deterministic-build-error
          - generated-index
          - internal-link-error
          - schema-validation-error
          - test-fixture-correction
          - narrow-ci-configuration-error
      current_attempt:
        description: Current repair attempt
        required: true
        default: "1"
        type: choice
        options:
          - "1"
          - "2"
      target_branch:
        description: Feature branch the repair would target (never master/main)
        required: true
      owner_approved:
        description: Owner approval to prepare a repair request
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  prepare-repair-request:
    name: Prepare repair request (no code changes)
    runs-on: ubuntu-latest
    env:
      TASK_ID: ${{ github.event.inputs.task_id }}
      FAILED_RUN_URL: ${{ github.event.inputs.failed_run_url }}
      FAILURE_CATEGORY: ${{ github.event.inputs.failure_category }}
      CURRENT_ATTEMPT: ${{ github.event.inputs.current_attempt }}
      TARGET_BRANCH: ${{ github.event.inputs.target_branch }}
      OWNER_APPROVED: ${{ github.event.inputs.owner_approved }}
    steps:
      - name: Checkout (read-only)
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Validate inputs and emit repair request
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const { spawnSync } = require('node:child_process');
          const errors = [];
          const single = (s) => typeof s === 'string' && !/[\r\n]/.test(s);
          const hasControl = (s) => [...s].some((ch) => { const c = ch.charCodeAt(0); return c < 0x20 || c === 0x7f; });

          const taskId = (process.env.TASK_ID || '').trim();
          const runUrl = (process.env.FAILED_RUN_URL || '').trim();
          const category = (process.env.FAILURE_CATEGORY || '').trim();
          const attempt = (process.env.CURRENT_ATTEMPT || '').trim();
          const branch = (process.env.TARGET_BRANCH || '').trim();
          const approved = (process.env.OWNER_APPROVED || '').trim();

          const ALLOWED = ['formatting','lint','deterministic-type-error','deterministic-build-error','generated-index','internal-link-error','schema-validation-error','test-fixture-correction','narrow-ci-configuration-error'];
          const TASK_ID_RE = /^CBW-[A-Z0-9]+(?:-[A-Z0-9]+)*-\d{3}[A-Z]?(?:-R\d+)?$/;

          if (approved !== 'true') errors.push('owner_approved must be true');
          if (attempt !== '1' && attempt !== '2') errors.push('current_attempt must be 1 or 2');
          if (!ALLOWED.includes(category)) errors.push(`failure_category not in allowlist: ${category}`);
          if (!TASK_ID_RE.test(taskId)) errors.push('task_id does not match the governed CBW task-ID grammar');

          // target_branch: JS pre-checks, then git-native validation (no shell).
          const rawBranch = process.env.TARGET_BRANCH || '';
          if (!single(rawBranch) || hasControl(rawBranch)) errors.push('target_branch must be single-line without control characters');
          else if (branch === 'master' || branch === 'main' || branch === 'HEAD') errors.push('target_branch must not be an authority branch or HEAD');
          else if (branch.startsWith('origin/')) errors.push('target_branch must not be a remote-tracking ref (origin/...)');
          else if (branch.includes('@{')) errors.push('target_branch must not use @{...} syntax');
          else if (!/^[A-Za-z0-9._\/-]+$/.test(branch)) errors.push('target_branch contains characters outside the safe allowlist (letters, digits, dot, underscore, slash, hyphen)');
          else {
            const r = spawnSync('git', ['check-ref-format', '--branch', branch], { shell: false, encoding: 'utf8' });
            if (r.status !== 0) errors.push('target_branch failed git check-ref-format --branch');
          }

          const RUN_RE = /^https:\/\/github\.com\/ros190392-source\/cryptobonusworld\/actions\/runs\/\d+(?:\/[A-Za-z0-9._\/-]*)?$/;
          if (!single(runUrl) || !RUN_RE.test(runUrl)) errors.push('failed_run_url must be a single-line GitHub Actions run URL for ros190392-source/cryptobonusworld');

          if (errors.length) {
            for (const e of errors) console.error(`::error::${e}`);
            process.exit(1);
          }

          const lines = [
            '## CBW Repair Request (owner-approved, manual)',
            '',
            `- task_id: ${taskId}`,
            `- failed_run_url: ${runUrl}`,
            `- failure_category: ${category}`,
            `- current_attempt: ${attempt} of 2`,
            `- target_branch: ${branch}`,
            '',
            'This request makes no code changes, calls no AI provider, pushes no commit, merges nothing and deploys nothing.',
            'Any actual repair must be performed under a task contract on the same branch, inside the original scope, as a new commit.',
            ''
          ];
          fs.writeFileSync('repair-request.md', lines.join('\n'));
          if (process.env.GITHUB_STEP_SUMMARY) fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, lines.join('\n'));
          console.log('repair request prepared');
          NODE

      - name: Upload repair-request summary (non-secret)
        uses: actions/upload-artifact@v4
        with:
          name: cbw-repair-request
          path: repair-request.md
          if-no-files-found: error
