name: Telegram Reports

on:
  workflow_dispatch:

jobs:
  send-reports:
    name: Send Telegram Reports
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Send bonus report
        run: npm run bonus:telegram-report -- --send

      - name: Send affiliate report
        run: npm run affiliate:telegram-report -- --send

      - name: Send screenshots report
        run: npm run screenshots:telegram-report -- --send