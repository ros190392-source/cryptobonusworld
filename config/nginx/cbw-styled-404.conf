# CryptoBonusWorld — styled 404 page
# Source of truth for the production nginx directive on 23.88.106.140.
#
# Applied 2026-07-14 directly in /etc/nginx/sites-enabled/cryptobonusworld
# (NOT installed as an include snippet — it is a single server-level line).
# This file documents the intentional config so future maintenance does not
# treat it as drift or remove it.
#
# Directive (placed at SERVER level in the 443 server block, after `index`,
# before all location blocks):
#
#     error_page 404 /404.html;
#
# Behavior:
#   - Unknown URLs still return HTTP status 404 (error_page does not change
#     the status code unless `=` is used — it is not).
#   - The response body is the styled Astro-built /404.html page from
#     /var/www/cryptobonusworld/html (light shell, popular-links list),
#     replacing nginx's default plain "404 Not Found" text.
#   - /404.html requested directly still returns 200 via the normal
#     `location /` try_files chain.
#
# Interactions / scope guard:
#   - MUST NOT interfere with snippets/cbw-legacy-redirects.conf (the legacy
#     301 rules match their locations first and return 301 before any 404 is
#     produced). Verified 2026-07-14: /guides/test-old-url/ -> 301 /,
#     /exchanges/binance/ -> 301 /exchanges/ still work.
#   - Applies to every location that ends in `=404` (pages, static assets,
#     walkthrough media, sitemap) — a missing asset serves the 404 HTML body
#     with a 404 status, which is standard nginx error_page behavior.
#   - No effect on /go/*, promo codes, affiliate URLs, sitemap, or IndexNow.
#
# APPLY (manual, root@23.88.106.140) — only needed if the server block is
# ever rebuilt from scratch:
#   1. Add the directive at server level in the 443 block:
#          error_page 404 /404.html;
#   2. nginx -t && systemctl reload nginx
#
# Production backup taken before the 2026-07-14 change:
#   /root/cryptobonusworld.nginx.bak-before-404-page-20260714-211230

error_page 404 /404.html;
